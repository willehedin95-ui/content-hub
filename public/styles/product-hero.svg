<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <!-- Product box -->
  <rect x="65" y="60" width="70" height="80" rx="4" fill="none" stroke="#e0e7ff" stroke-width="3"/>
  <polyline points="65,60 100,42 135,60" fill="none" stroke="#e0e7ff" stroke-width="3" stroke-linejoin="round"/>
  <line x1="100" y1="42" x2="100" y2="60" stroke="#e0e7ff" stroke-width="2"/>
  <!-- Shine lines -->
  <line x1="145" y1="50" x2="160" y2="40" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="65" x2="163" y2="62" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  <line x1="145" y1="80" x2="158" y2="83" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  <!-- Label on box -->
  <rect x="80" y="85" width="40" height="20" rx="2" fill="#a5b4fc" opacity="0.5"/>
  <text x="100" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e0e7ff">PRODUCT</text>
</svg>
