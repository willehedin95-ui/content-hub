<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Left half -->
  <rect x="0" y="0" width="100" height="200" fill="#1e3a5f"/>
  <!-- Right half -->
  <rect x="100" y="0" width="100" height="200" fill="#5b21b6"/>
  <!-- Divider -->
  <line x1="100" y1="0" x2="100" y2="200" stroke="#ffffff" stroke-width="2"/>
  <!-- VS circle -->
  <circle cx="100" cy="100" r="24" fill="#ffffff"/>
  <text x="100" y="108" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#111827">VS</text>
  <!-- Left item placeholder -->
  <rect x="25" y="50" width="50" height="40" rx="5" fill="none" stroke="#93c5fd" stroke-width="2"/>
  <rect x="35" y="60" width="30" height="4" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="38" y="70" width="24" height="4" rx="2" fill="#93c5fd" opacity="0.6"/>
  <!-- Right item placeholder -->
  <rect x="125" y="50" width="50" height="40" rx="5" fill="none" stroke="#c4b5fd" stroke-width="2"/>
  <rect x="135" y="60" width="30" height="4" rx="2" fill="#c4b5fd" opacity="0.6"/>
  <rect x="138" y="70" width="24" height="4" rx="2" fill="#c4b5fd" opacity="0.6"/>
  <!-- Checkmark left -->
  <polyline points="40,140 48,150 62,132" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- X right -->
  <line x1="140" y1="132" x2="160" y2="152" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="132" x2="140" y2="152" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
  <text x="50" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#bfdbfe">OURS</text>
  <text x="150" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ddd6fe">THEIRS</text>
</svg>
