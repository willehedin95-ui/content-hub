<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#warm)"/>
  <!-- Magnifying glass -->
  <circle cx="90" cy="85" r="35" fill="none" stroke="#92400e" stroke-width="4"/>
  <circle cx="90" cy="85" r="30" fill="#fffbeb" opacity="0.5"/>
  <line x1="115" y1="110" x2="145" y2="140" stroke="#92400e" stroke-width="5" stroke-linecap="round"/>
  <!-- Detail lines inside lens -->
  <circle cx="85" cy="78" r="8" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <circle cx="95" cy="90" r="5" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <!-- Glare -->
  <path d="M72,70 Q76,62 82,68" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#92400e">CLOSEUP</text>
</svg>
